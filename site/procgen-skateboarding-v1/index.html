<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural Skateboarding Simulator</title>
    <link rel="stylesheet" href="./index.css" />
    <!-- Google Fonts: Inter and Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="game-container">
      <canvas id="canvas"></canvas>

      <!-- Glassmorphic HUD overlay -->
      <div id="hud">
        <!-- Top Left: Score and Combo info -->
        <div class="hud-panel top-left animate-slide-in">
          <div class="hud-label">SCORE</div>
          <div id="score-val">0</div>
          <div class="hud-sub-row">
            <span class="hud-label">MULTIPLIER:</span>
            <span id="multiplier-val">x1</span>
          </div>
          <div id="combo-tricks"></div>
        </div>

        <!-- Top Right: Speed and State info -->
        <div class="hud-panel top-right animate-slide-in">
          <div class="hud-label">SPEED</div>
          <div class="speed-row">
            <span id="speed-val">0</span>
            <span class="speed-unit">km/h</span>
          </div>
          <div class="hud-sub-row">
            <span class="hud-label">AIR TIME:</span>
            <span id="airtime-val">0.0s</span>
          </div>
        </div>

        <!-- Center: Trick alerts and status notices -->
        <div id="center-message" class="hidden">
          <div id="trick-name" class="pop-out">KICKFLIP</div>
          <div id="trick-pts">+500 pts</div>
        </div>

        <!-- Bottom Center: Controls guide -->
        <div class="hud-panel bottom-center animate-fade-in">
          <div class="controls-title">CONTROLS</div>
          <div class="controls-grid">
            <div class="control-item">
              <span>W, A, S, D / Arrows</span><span>Steer / Lean</span>
            </div>
            <div class="control-item">
              <span>Spacebar</span><span>Ollie / Jump</span>
            </div>
            <div class="control-item">
              <span>Air + W/S/A/D</span><span>Flips & Spins</span>
            </div>
            <div class="control-item">
              <span>R</span><span>Respawn / Reset</span>
            </div>
          </div>
        </div>

        <!-- Wipeout screen -->
        <div id="wipeout-screen" class="hidden">
          <div class="wipeout-content">
            <h1 class="wipeout-title">WIPEOUT!</h1>
            <p class="wipeout-subtitle">You crashed hard!</p>
            <button id="respawn-btn">PRESS [ R ] TO RESPAWN</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Game Script -->
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
