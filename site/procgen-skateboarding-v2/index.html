<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Rider - 2D Procedural Skateboarding Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <!-- Glassmorphism HUD Overlay -->
    <div id="hud">
      <div class="hud-header">
        <div class="stat-box">
          <div class="stat-label">SCORE</div>
          <div class="stat-value" id="score-val">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">MULTIPLIER</div>
          <div class="stat-value highlight" id="mult-val">x1</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">SPEED</div>
          <div class="stat-value" id="speed-val">0.0 km/h</div>
        </div>
      </div>

      <div class="hud-center">
        <div id="trick-display" class="hidden">Kickflip</div>
        <div id="wipeout-banner" class="hidden">WIPEOUT!</div>
      </div>

      <div class="hud-footer">
        <div class="controls-panel">
          <div class="control-key">
            <span>←</span><span>→</span> Push (on ground) / Spin (in air)
          </div>
          <div class="control-key"><span>↓</span> Crouch</div>
          <div class="control-key"><span>Space</span> Ollie (Jump)</div>
          <div class="control-key"><span>R</span> Reset</div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
