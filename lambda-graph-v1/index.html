<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>λ-Graph | Interactive Lambda Calculus Visualizer</title>
    <meta
      name="description"
      content="An interactive visual simulator for lambda-calculus reduction using force-directed graphs and step-by-step beta-reduction animations."
    />

    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />

    
  <style>/* site/lambda-graph-v1/index.css */
:root {
  --bg-primary: #0a0d16;
  --bg-sidebar: #0f1322;
  --bg-panel: #161c2db3;
  --border-color: #ffffff14;
  --border-glow: #8b5cf633;
  --accent-violet: #8b5cf6;
  --accent-violet-glow: #8b5cf666;
  --accent-pink: #ec4899;
  --accent-teal: #14b8a6;
  --accent-teal-glow: #14b8a666;
  --accent-amber: #f59e0b;
  --accent-amber-glow: #f59e0b66;
  --accent-crimson: #ef4444;
  --accent-crimson-glow: #ef444466;
  --font-sans: "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-mono: "JetBrains Mono", "Fira Code", monospace;
  --sidebar-width: 380px;
  --panel-radius: 12px;
  --transition-speed: .25s;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background-color: var(--bg-primary);
  color: #f3f4f6;
  font-family: var(--font-sans);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  height: 100vh;
}

.app-container {
  display: flex;
  width: 100vw;
  height: 100vh;
}

.sidebar {
  width: var(--sidebar-width);
  background-color: var(--bg-sidebar);
  border-right: 1px solid var(--border-color);
  display: flex;
  overflow-y: auto;
  z-index: 10;
  flex-direction: column;
  flex-shrink: 0;
  gap: 20px;
  height: 100%;
  padding: 24px;
  box-shadow: 10px 0 30px #0000004d;
}

.sidebar::-webkit-scrollbar {
  width: 6px;
}

.trace-box::-webkit-scrollbar {
  width: 6px;
}

.sidebar::-webkit-scrollbar-track {
  background: none;
}

.trace-box::-webkit-scrollbar-track {
  background: none;
}

.sidebar::-webkit-scrollbar-thumb {
  background: #ffffff1a;
  border-radius: 3px;
}

.trace-box::-webkit-scrollbar-thumb {
  background: #ffffff1a;
  border-radius: 3px;
}

.sidebar::-webkit-scrollbar-thumb:hover {
  background: #fff3;
}

.trace-box::-webkit-scrollbar-thumb:hover {
  background: #fff3;
}

.brand {
  display: flex;
  border-bottom: 1px solid var(--border-color);
  align-items:  center;
  gap: 12px;
  padding-bottom: 16px;
}

.brand-logo {
  display: flex;
  justify-content: center;
  align-items:  center;
}

.glowing-lambda {
  filter: drop-shadow(0 0 8px var(--accent-violet-glow));
  animation: lambda-pulse 3s infinite ease-in-out;
}

@keyframes lambda-pulse {
  0%, 100% {
    filter: drop-shadow(0 0 6px var(--accent-violet-glow));
    transform: scale(1);
  }

  50% {
    filter: drop-shadow(0 0 14px var(--accent-pink));
    transform: scale(1.03);
  }
}

.brand-text h1 {
  background: linear-gradient(135deg, var(--accent-violet), var(--accent-pink));
  -webkit-text-fill-color: transparent;
  letter-spacing: -.5px;
  -webkit-background-clip: text;
  font-size: 1.5rem;
  font-weight: 800;
  line-height: 1.1;
}

.brand-text span {
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: .75rem;
  font-weight: 400;
}

.panel-section {
  display: flex;
  background-color: var(--bg-panel);
  border: 1px solid var(--border-color);
  border-radius: var(--panel-radius);
  backdrop-filter: blur(12px);
  transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
  flex-direction: column;
  gap: 8px;
  padding: 16px;
  box-shadow: 0 4px 20px #00000026;
}

.panel-section:hover {
  border-color: #8b5cf626;
  box-shadow: 0 4px 25px #8b5cf60d;
}

.panel-section.flex-grow {
  flex-grow: 1;
  min-height: 150px;
}

.section-title {
  text-transform: uppercase;
  letter-spacing: .75px;
  color: #9ca3af;
  margin-bottom: 2px;
  font-size: .85rem;
  font-weight: 700;
}

.select-wrapper {
  position: relative;
  width: 100%;
}

.select-wrapper select {
  border: 1px solid var(--border-color);
  color: #f3f4f6;
  font-family: var(--font-sans);
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
  transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
  background-color: #0f1322cc;
  border-radius: 8px;
  width: 100%;
  padding: 10px 14px;
  font-size: .9rem;
}

.select-wrapper select:focus {
  border-color: var(--accent-violet);
  box-shadow: 0 0 10px #8b5cf640;
}

.select-wrapper:after {
  content: "▼";
  color: #9ca3af;
  position: absolute;
  pointer-events: none;
  font-size: .65rem;
  top: 50%;
  right: 14px;
  transform: translateY(-50%);
}

.input-header {
  display: flex;
  justify-content: space-between;
  align-items:  center;
}

#term-input {
  border: 1px solid var(--border-color);
  color: #f3f4f6;
  font-family: var(--font-mono);
  resize: none;
  outline: none;
  transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
  background-color: #0f1322cc;
  border-radius: 8px;
  width: 100%;
  height: 90px;
  padding: 12px;
  font-size: .9rem;
  line-height: 1.4;
}

#term-input:focus {
  border-color: var(--accent-teal);
  box-shadow: 0 0 10px #14b8a640;
}

.syntax-guide {
  color: #9ca3af;
  font-size: .72rem;
  line-height: 1.4;
}

.syntax-guide code {
  font-family: var(--font-mono);
  color: #e5e7eb;
  background-color: #ffffff0d;
  border-radius: 4px;
  padding: 1px 4px;
}

.status-badge {
  text-transform: uppercase;
  letter-spacing: .5px;
  border-radius: 20px;
  padding: 3px 8px;
  font-size: .75rem;
  font-weight: 700;
}

.status-badge.state-idle {
  color: #9ca3af;
  background-color: #9ca3af1a;
  border: 1px solid #9ca3af33;
}

.status-badge.state-success {
  color: #2dd4bf;
  background-color: #14b8a61a;
  border: 1px solid #14b8a633;
  box-shadow: 0 0 8px #14b8a626;
}

.status-badge.state-error {
  color: #f87171;
  background-color: #ef44441a;
  border: 1px solid #ef444433;
  box-shadow: 0 0 8px #ef444426;
}

.status-badge.state-active {
  color: #a78bfa;
  animation: glow-pulse 1.5s infinite alternate;
  background-color: #8b5cf61a;
  border: 1px solid #8b5cf633;
  box-shadow: 0 0 8px #8b5cf626;
}

@keyframes glow-pulse {
  from {
    box-shadow: 0 0 4px #8b5cf626;
  }

  to {
    box-shadow: 0 0 12px #8b5cf666;
  }
}

.settings-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.setting-item {
  display: flex;
  justify-content: space-between;
  align-items:  center;
  gap: 10px;
}

.setting-label {
  color: #9ca3af;
  font-size: .85rem;
}

.slider-container {
  display: flex;
  flex-grow: 1;
  justify-content: flex-end;
  align-items:  center;
  gap: 10px;
}

#speed-slider {
  accent-color: var(--accent-violet);
  cursor: pointer;
  width: 100px;
}

#speed-display {
  font-family: var(--font-mono);
  text-align: right;
  width: 36px;
  font-size: .8rem;
}

.select-wrapper.compact select {
  padding: 6px 24px 6px 10px;
  font-size: .8rem;
}

.select-wrapper.compact:after {
  right: 10px;
}

.controls-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto;
  gap: 10px;
}

#reset-btn {
  grid-column: span 2;
}

.btn {
  display: flex;
  font-family: var(--font-sans);
  cursor: pointer;
  outline: none;
  transition: transform .15s ease, filter var(--transition-speed), box-shadow var(--transition-speed);
  border: none;
  border-radius: 8px;
  justify-content: center;
  align-items:  center;
  gap: 8px;
  padding: 11px 16px;
  font-size: .95rem;
  font-weight: 600;
}

.btn:active {
  transform: scale(.97);
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent-violet), var(--accent-pink));
  color: #fff;
  box-shadow: 0 4px 15px #8b5cf64d;
}

.btn-primary:hover {
  filter: brightness(1.1);
  box-shadow: 0 4px 22px #8b5cf673;
}

.btn-secondary {
  border: 1px solid var(--border-color);
  color: #f3f4f6;
  background-color: #ffffff0f;
}

.btn-secondary:hover {
  background-color: #ffffff1f;
  border-color: #fff3;
}

.btn-danger {
  color: #f87171;
  background-color: #ef444414;
  border: 1px solid #ef444433;
}

.btn-danger:hover {
  background-color: #ef444426;
  border-color: #ef444459;
  box-shadow: 0 0 12px #ef44441a;
}

.trace-box {
  border: 1px solid var(--border-color);
  font-family: var(--font-mono);
  overflow-y: auto;
  display: flex;
  background-color: #0a0d16cc;
  border-radius: 8px;
  flex-direction: column;
  gap: 8px;
  height: 100%;
  padding: 12px;
  font-size: .82rem;
}

.trace-empty {
  color: #6b7280;
  text-align: center;
  padding: 20px 0;
  font-style: italic;
}

.trace-item {
  word-break: break-all;
  white-space: pre-wrap;
  cursor: pointer;
  transition: background-color var(--transition-speed);
  background-color: #ffffff05;
  border-left: 3px solid #4b5563;
  border-radius: 4px;
  padding: 6px 8px;
}

.trace-item:hover {
  background-color: #ffffff0d;
}

.trace-item.active {
  border-left-color: var(--accent-violet);
  background-color: #8b5cf60d;
}

.legend-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.legend-item {
  display: flex;
  align-items:  center;
  gap: 8px;
}

.legend-color {
  border-radius: 3px;
  flex-shrink: 0;
  width: 10px;
  height: 100%;
  min-height: 12px;
}

.legend-color.node-lambda {
  background: linear-gradient(135deg, var(--accent-violet), #a78bfa);
  box-shadow: 0 0 6px var(--accent-violet-glow);
}

.legend-color.node-app {
  background: linear-gradient(135deg, #0d9488, var(--accent-teal));
  box-shadow: 0 0 6px var(--accent-teal-glow);
}

.legend-color.node-var {
  background: linear-gradient(135deg, var(--accent-amber), #fbbf24);
  box-shadow: 0 0 6px var(--accent-amber-glow);
}

.legend-color.link-ast {
  background-color: #6b7280;
}

.legend-color.link-var {
  background-color: #ec4899;
}

.legend-label {
  color: #9ca3af;
  font-size: .75rem;
}

.visualizer-main {
  position: relative;
  background-color: var(--bg-primary);
  background-image: radial-gradient(circle at 1px 1px, #ffffff08 1px, #0000 0);
  background-size: 24px 24px;
  flex-grow: 1;
  height: 100%;
}

#graph-container {
  width: 100%;
  height: 100%;
}

.floating-info {
  position: absolute;
  border: 1px solid var(--border-color);
  border-radius: var(--panel-radius);
  backdrop-filter: blur(16px);
  z-index: 5;
  transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
  background-color: #0f1322d9;
  width: 320px;
  padding: 16px;
  top: 24px;
  left: 24px;
  transform: translateY(0);
  box-shadow: 0 10px 30px #00000080;
}

.floating-info.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(-10px);
}

.info-header {
  display: flex;
  justify-content: space-between;
  align-items:  center;
  margin-bottom: 8px;
}

.info-header h3 {
  color: #e5e7eb;
  font-size: .95rem;
  font-weight: 700;
}

.close-btn {
  color: #9ca3af;
  cursor: pointer;
  background: none;
  border: none;
  font-size: 1.2rem;
  line-height: 1;
}

.close-btn:hover {
  color: #f3f4f6;
}

#info-desc {
  color: #9ca3af;
  font-size: .85rem;
  line-height: 1.4;
}

.camera-controls {
  position: absolute;
  display: flex;
  z-index: 5;
  flex-direction: column;
  gap: 8px;
  bottom: 24px;
  right: 24px;
}

.camera-btn {
  border: 1px solid var(--border-color);
  color: #f3f4f6;
  cursor: pointer;
  display: flex;
  backdrop-filter: blur(8px);
  transition: background-color var(--transition-speed), border-color var(--transition-speed);
  background-color: #161c2dcc;
  border-radius: 8px;
  justify-content: center;
  align-items:  center;
  width: 40px;
  height: 40px;
  font-size: 1.25rem;
  font-weight: 600;
}

.camera-btn:hover {
  color: #fff;
  background-color: #8b5cf626;
  border-color: #8b5cf64d;
}

.camera-btn.text-btn {
  font-family: var(--font-sans);
  text-transform: uppercase;
  letter-spacing: .5px;
  font-size: .7rem;
  font-weight: 700;
}

button:disabled, select:disabled, textarea:disabled {
  opacity: .5;
  cursor: not-allowed !important;
}
</style></head>
  <body>
    <div class="app-container">
      <!-- Sidebar Control Panel -->
      <aside class="sidebar">
        <!-- Brand Header -->
        <div class="brand">
          <div class="brand-logo">
            <svg
              viewBox="0 0 100 100"
              width="32"
              height="32"
              class="glowing-lambda"
            >
              <defs>
                <linearGradient
                  id="logo-grad"
                  x1="0%"
                  y1="0%"
                  x2="100%"
                  y2="100%"
                >
                  <stop offset="0%" stop-color="#8b5cf6" />
                  <stop offset="100%" stop-color="#ec4899" />
                </linearGradient>
                <filter id="glow">
                  <feGaussianBlur stdDeviation="3" result="blur" />
                  <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
              </defs>
              <path
                d="M30,80 L55,45 L40,20 L55,20 L65,40 L80,80 L68,80 L60,48 L42,80 Z"
                fill="url(#logo-grad)"
                filter="url(#glow)"
              />
            </svg>
          </div>
          <div class="brand-text">
            <h1>λ-Graph</h1>
            <span>Lambda Calculus Visualizer</span>
          </div>
        </div>

        <!-- Section: Example Presets -->
        <div class="panel-section">
          <label class="section-title" for="preset-select"
            >Interactive Presets</label
          >
          <div class="select-wrapper">
            <select id="preset-select">
              <option value="" disabled selected>
                Select an example program...
              </option>
              <option value="identity">Identity Term: λx. x</option>
              <option value="mockingbird">Mockingbird: λx. x x</option>
              <option value="beta_demo">
                Beta-Reduction Demo: (λx. x x) (λy. y)
              </option>
              <option value="k_comb">K-Combinator: λx. λy. x</option>
              <option value="s_comb">
                S-Combinator: λx. λy. λz. (x z) (y z)
              </option>
              <option value="omega">
                Omega (Infinite Loop): (λx. x x) (λx. x x)
              </option>
              <option value="church_two">
                Church Numeral 2: λf. λx. f (f x)
              </option>
              <option value="succ_one">
                Successor of 1: (λn. λf. λx. f (n f x)) (λf. λx. f x)
              </option>
            </select>
          </div>
        </div>

        <!-- Section: Custom Term Input -->
        <div class="panel-section">
          <div class="input-header">
            <label class="section-title" for="term-input"
              >Lambda Term Input</label
            >
            <span id="parse-status" class="status-badge state-idle">Empty</span>
          </div>
          <textarea
            id="term-input"
            placeholder="e.g., (lambda x . (x x)) (lambda y . y)"
            spellcheck="false"
          ></textarea>
          <div class="syntax-guide">
            Syntax: <code>x</code>, <code>(lambda x . M)</code>,
            <code>(M N)</code>, <code>\x.M</code>, <code>λx.M</code>
          </div>
        </div>

        <!-- Section: Settings -->
        <div class="panel-section">
          <label class="section-title">Reduction Configuration</label>

          <div class="settings-grid">
            <div class="setting-item">
              <span class="setting-label">Strategy</span>
              <div class="select-wrapper compact">
                <select id="strategy-select">
                  <option value="normal" selected>
                    Normal Order (Outermost)
                  </option>
                  <option value="applicative">
                    Applicative Order (Innermost)
                  </option>
                </select>
              </div>
            </div>

            <div class="setting-item">
              <span class="setting-label">Speed</span>
              <div class="slider-container">
                <input
                  type="range"
                  id="speed-slider"
                  min="0.25"
                  max="3"
                  step="0.25"
                  value="1"
                />
                <span id="speed-display">1.0x</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Section: Controls -->
        <div class="panel-section controls-section">
          <button
            id="step-btn"
            class="btn btn-secondary"
            title="Perform one beta-reduction step"
          >
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polygon
                points="5 4 15 12 5 20 5 4"
                fill="currentColor"
              ></polygon>
              <line x1="19" y1="5" x2="19" y2="19"></line>
            </svg>
            Step
          </button>

          <button
            id="normalize-btn"
            class="btn btn-primary"
            title="Fully normalize the term with animations"
          >
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polygon
                points="6 4 20 12 6 20 6 4"
                fill="currentColor"
              ></polygon>
            </svg>
            Normalize
          </button>

          <button
            id="reset-btn"
            class="btn btn-danger"
            title="Reset term to initial state"
          >
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M2.5 2v6h6M21.5 22v-6h-6"></path>
              <path
                d="M22 11.5A10 10 0 0 0 3.2 7.2L2.5 8M2 12.5a10 10 0 0 0 18.8 4.3l.7-0.8"
              ></path>
            </svg>
            Reset
          </button>
        </div>

        <!-- Section: Execution Trace History -->
        <div class="panel-section flex-grow">
          <label class="section-title">Reduction Trace</label>
          <div id="trace-container" class="trace-box">
            <div class="trace-empty">No trace active</div>
          </div>
        </div>

        <!-- Section: Color Legend -->
        <div class="panel-section legend-section">
          <label class="section-title">Visual Legend</label>
          <div class="legend-grid">
            <div class="legend-item">
              <span class="legend-color node-lambda"></span>
              <span class="legend-label">Lambda Node (λx)</span>
            </div>
            <div class="legend-item">
              <span class="legend-color node-app"></span>
              <span class="legend-label">Application (@)</span>
            </div>
            <div class="legend-item">
              <span class="legend-color node-var"></span>
              <span class="legend-label">Free Variable</span>
            </div>
            <div class="legend-item">
              <span class="legend-color link-ast"></span>
              <span class="legend-label">AST Parent-Child</span>
            </div>
            <div class="legend-item">
              <span class="legend-color link-var"></span>
              <span class="legend-label">Variable Binder link</span>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Visualizer Area -->
      <main class="visualizer-main">
        <!-- Floating Active Step Card -->
        <div id="info-card" class="floating-info hidden">
          <div class="info-header">
            <h3>Beta-Reduction Active</h3>
            <button id="close-info" class="close-btn">&times;</button>
          </div>
          <p id="info-desc">
            Substituting argument into bound variable locations...
          </p>
        </div>

        <!-- Interactive Force-Graph Container -->
        <div id="graph-container"></div>

        <!-- Floating Camera & Engine Controls -->
        <div class="camera-controls">
          <button id="zoom-in-btn" class="camera-btn" title="Zoom In">+</button>
          <button id="zoom-out-btn" class="camera-btn" title="Zoom Out">
            &minus;
          </button>
          <button
            id="zoom-fit-btn"
            class="camera-btn"
            title="Recenter & Fit View"
          >
            Fit
          </button>
          <button
            id="physics-btn"
            class="camera-btn text-btn"
            title="Toggle force physics simulation"
          >
            Freeze
          </button>
        </div>
      </main>

      isAutoPlayActive = false;
      if (autoPlayTimer)
        clearTimeout(autoPlayTimer);
      normalizeBtn.innerHTML = `
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
          <polygon points="6 4 20 12 6 20 6 4" fill="currentColor"></polygon>
        </svg> Normalize`;
    } else {
      isAutoPlayActive = true;
      normalizeBtn.innerHTML = `
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="6" y="4" width="4" height="16" fill="currentColor"></rect>
          <rect x="14" y="4" width="4" height="16" fill="currentColor"></rect>
        </svg> Pause`;
      triggerStepReduction();
    }
  });
  resetBtn.addEventListener("click", () => {
    if (isAnimating)
      return;
    isAutoPlayActive = false;
    if (autoPlayTimer)
      clearTimeout(autoPlayTimer);
    normalizeBtn.innerHTML = `
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
        <polygon points="6 4 20 12 6 20 6 4" fill="currentColor"></polygon>
      </svg> Normalize`;
    if (initialAST) {
      currentAST = cloneAST(initialAST);
      historyTrace = [cloneAST(initialAST)];
      updateTraceUI();
      renderCurrentAST(false);
      termInput.value = cleanDisplayString(currentAST);
    }
  });
  presetSelect.addEventListener("change", () => {
    const key = presetSelect.value;
    const termStr = PRESETS[key];
    if (termStr) {
      termInput.value = termStr;
      loadAndRenderTerm(termStr);
    }
  });
  let typingTimeout = null;
  termInput.addEventListener("input", () => {
    if (typingTimeout)
      clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      const val = termInput.value.trim();
      if (val) {
        loadAndRenderTerm(val);
      } else {
        parseStatus.innerText = "Empty";
        parseStatus.className = "status-badge state-idle";
        termInput.style.borderColor = "";
      }
    }, 450);
  });
  closeInfo.addEventListener("click", () => {
    infoCard.classList.add("hidden");
  });
  presetSelect.value = "beta_demo";
  termInput.value = PRESETS["beta_demo"];
  loadAndRenderTerm(PRESETS["beta_demo"]);
});
</script></body>
</html>
